schema_version: 1
experiment_id: "qwen35_4b_long_horizon_answer_potential_sft"
external_root: /workspace/large_artifacts/qwen35_4b_long_horizon_answer_potential_sft
external_artifacts:
  - name: raw generation, score, rollout, and branch shards
    storage: /workspace/large_artifacts/qwen35_4b_long_horizon_answer_potential_sft/pools
    required_for: exact selector reconstruction and alternate diagnostics
    checksum: atomic per-shard SHA-256 receipts in each external stage index.json
    regenerate: .venv-vllm/bin/python experiments/qwen35_4b_long_horizon_answer_potential_sft/scripts/run.py --stage full
  - name: exact-token six-arm SFT datasets
    storage: /workspace/large_artifacts/qwen35_4b_long_horizon_answer_potential_sft/sft
    required_for: matched QLoRA training matrix
    checksum: data/sft_manifest.json after selection
    regenerate: .venv-vllm/bin/python experiments/qwen35_4b_long_horizon_answer_potential_sft/scripts/run.py --stage select
  - name: QLoRA adapters
    storage: /workspace/large_artifacts/qwen35_4b_long_horizon_answer_potential_sft/adapters
    required_for: trained-arm reproduction
    checksum: per-arm training_receipt.json
    regenerate: .venv-vllm/bin/python experiments/qwen35_4b_long_horizon_answer_potential_sft/scripts/run.py --stage train
  - name: merged composite checkpoints
    storage: /workspace/large_artifacts/qwen35_4b_long_horizon_answer_potential_sft/merged
    required_for: vLLM trained-arm evaluation
    checksum: per-arm merge_receipt.json plus behavioral_difference_probe.json
    regenerate: .venv-vllm/bin/python experiments/qwen35_4b_long_horizon_answer_potential_sft/scripts/run.py --stage merge
  - name: raw long-horizon evaluation generations
    storage: /workspace/large_artifacts/qwen35_4b_long_horizon_answer_potential_sft/evaluation
    required_for: exact paired analysis, k=8, and alternate parsing
    checksum: external evaluation index.json files contain per-split SHA-256 receipts
    regenerate: .venv-vllm/bin/python experiments/qwen35_4b_long_horizon_answer_potential_sft/scripts/run.py --stage evaluate-greedy
omitted_artifacts:
  - path: raw token-level candidate shards
    reason: planned pool and exact-token SFT rows are large; tracked manifests retain paths, counts, and SHA-256 receipts
reproducibility:
  smoke_command: .venv-vllm/bin/python experiments/qwen35_4b_long_horizon_answer_potential_sft/scripts/run.py --stage smoke
  full_command: .venv-vllm/bin/python experiments/qwen35_4b_long_horizon_answer_potential_sft/scripts/run.py --stage full
  required_external_artifacts: []
notes: >-
  Design is committed before scientific GPU work. Raw shards are atomic and restartable. No adapter or
  merged model is placed in the repository tree.
