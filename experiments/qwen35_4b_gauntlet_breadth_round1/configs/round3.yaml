# Round 3: expert iteration proper — re-harvest with the round-2 merged model.
# Fresh item seeds (train-pool namespace advanced) so round 3 supervises new
# instances; same families, same fast-loop shape. Queue proposal:
# gauntlet_round3_expert_iteration.

round: 3
artifacts_dir: large_artifacts/qwen35_4b_gauntlet_breadth_round1

engine:
  max_model_len: 16384
  gpu_memory_utilization: 0.85
  max_num_seqs: 64
  max_num_batched_tokens: 16384

harvest:
  run_seed: 43001
  temperature: 0.8
  top_p: 0.95
  top_k: 20
  think_budget: 2048            # round-2 model closes chains far more often;
  episode_think_budget: 2048    # escalate per-family only if yields say so
  think_budget_by_family:
    glyphgate: 4096
    loomfix: 4096
    stallwright: 4096
  answer_max_tokens: 192
  atoms:
    families: [caravan, foundry_ledger, stallwright, runeward, kilnrite, glyphgate, loomfix, ferrier, burrowmaze, gatepost]
    gen_seed: 13001             # fresh train-pool namespace (round 1 used 11001)
    k: 2
    per_level: {1: 30, 2: 40, 3: 40}   # shift mass upward: L1 is near-solved
  episodes:
    families: [kilnrite, glyphgate, loomfix, ferrier, burrowmaze, gatepost]
    seed_base: 23000            # fresh (round 1 used 21000)
    k: 2
    per_level: {1: 12, 2: 20, 3: 20}   # open the L3 episode frontier

sft:
  out: data/sft_round3_fast.jsonl
  max_think_tokens: 2000
  max_answer_tokens: 96
  max_per_item: 2
  max_rollouts_per_episode: 2
  family_cap: 400

train:
  # Train from BASE on round1+round3 union (pass both files to train_think),
  # keeping the round-2 recipe: recovery arm + weighted loss.
  adapter_out: large_artifacts/qwen35_4b_gauntlet_breadth_round1/adapters/round3_fast
  epochs: 2.0
  lr: 2.0e-4
  rank: 32
  alpha: 64
  grad_accum: 8
  batch_size: 2
  max_length: 2048
  seed: 42

eval_gym:
  gen_seed: 90001
  atoms_per_level: 25
  episodes_per_level: 8
  episode_levels: [1, 2, 3]
  think_budget: 1024
  answer_max_tokens: 96

menagerie:
  tier: quick
  think: default
