notes: "All model-facing inference must use the copied vLLM runner with Qwen/Qwen3.5-4B at the repository-pinned revision. Train-only calibration/interface rows remain in git when reasonably sized; scientific-smoke and full raw rows use their canonical external roots and tracked checksum catalogs. Lower-rung censored outputs and termination probes are diagnostic artifacts and can never be pooled into scored results."
