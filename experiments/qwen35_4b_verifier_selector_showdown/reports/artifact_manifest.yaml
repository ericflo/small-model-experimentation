# Standard artifact manifest for external, omitted, or reproducibility-critical outputs.
schema_version: 1
experiment_id: "qwen35_4b_verifier_selector_showdown"
external_artifacts: []
omitted_artifacts: []
in_repo_artifacts:
  - path: "data/pool.jsonl, data/gv_records.jsonl, data/gv_labels.jsonl, data/tasks.json"
    reason: "candidate pool (reused from qwen35_4b_generator_verifier_gap) + visible-test labels"
  - path: "runs/summary.json, analysis/selectors.png"
