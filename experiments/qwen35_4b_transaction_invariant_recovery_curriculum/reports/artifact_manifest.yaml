schema_version: 1
experiment_id: "qwen35_4b_transaction_invariant_recovery_curriculum"
external_artifacts:
  - name: matched transition banks
    storage: large_artifacts/qwen35_4b_transaction_invariant_recovery_curriculum/bank
    required_for: exact training replay
    checksum: recorded in bank/receipt.json and the final result receipt
    regenerate: .venv/bin/python experiments/qwen35_4b_transaction_invariant_recovery_curriculum/scripts/build_bank.py
  - name: adapters and merged checkpoints
    storage: large_artifacts/qwen35_4b_transaction_invariant_recovery_curriculum/{adapters,merged}
    required_for: candidate/control evaluation and replication
    checksum: recorded in training and merge receipts
    regenerate: .venv/bin/python experiments/qwen35_4b_transaction_invariant_recovery_curriculum/scripts/run.py --full
  - name: detailed evaluation trajectories and locality logits
    storage: large_artifacts/qwen35_4b_transaction_invariant_recovery_curriculum/eval
    required_for: paired gates and forensics
    checksum: recorded in the final compact result receipt
    regenerate: .venv/bin/python experiments/qwen35_4b_transaction_invariant_recovery_curriculum/scripts/run.py --full
omitted_artifacts:
  - path: large_artifacts/qwen35_4b_transaction_invariant_recovery_curriculum
    reason: multi-gigabyte model checkpoints and detailed generated trajectories
reproducibility:
  smoke_command: python experiments/qwen35_4b_transaction_invariant_recovery_curriculum/scripts/run.py --smoke
  full_command: .venv/bin/python experiments/qwen35_4b_transaction_invariant_recovery_curriculum/scripts/run.py --full
  required_external_artifacts:
    - large_artifacts/qwen35_4b_verifier_conditioned_recovery_bank/merged/recovery_action
    - large_artifacts/qwen35_4b_repo_search_compress_bank/merged/apex_replay
    - large_artifacts/qwen35_4b_verifier_conditioned_recovery_bank/bank/recovery_action.jsonl
notes: Menagerie is sealed until every white-box gate passes; use only its public CLI.
