# Standard artifact manifest for external, omitted, or reproducibility-critical outputs.
schema_version: 1
experiment_id: "qwen35_4b_why_think_scale"
external_artifacts:
  - name: "base_reserialized composite (training + merge base)"
    storage: "large_artifacts/qwen35_4b_universal_curriculum/merged/base_reserialized"
    required_for: "training every rung adapter and merging it"
    checksum: "tree 26d8ee48583adb0fb557d0ff668664949adff0068fa5baafe6f0af68e22fb677; weights b654e033d525d87cbbd746bb681d80813c4b00d8e6202cb3edcfb6dfa3b416db"
    regenerate: "produced by experiments/qwen35_4b_universal_curriculum; authenticated fail-closed here against data/provenance/base_reserialized.json"
  - name: "dual-channel WHY-think rung corpora (2000/5000/10000/20000/40000 rows)"
    storage: "large_artifacts/qwen35_4b_why_think_scale/corpora/why_think_<rows>.jsonl"
    required_for: "training each ladder rung"
    checksum: "sha-pinned per rung in data/ladder_manifest.json"
    regenerate: "python scripts/run.py --stage gen-ladder (deterministic from the in-cell generator + seed 95200; large + regenerable, so gitignored)"
  - name: "per-rung LoRA adapters (fresh r32/a64)"
    storage: "large_artifacts/qwen35_4b_why_think_scale/adapters/why_think_<rows>"
    required_for: "rerun the per-rung merge + transfer measurement"
    checksum: "pinned in runs/training/why_think_<rows>.json after --stage train --rows N"
    regenerate: "python scripts/run.py --stage train --rows N"
  - name: "per-rung merged composites"
    storage: "large_artifacts/qwen35_4b_why_think_scale/merged/why_think_<rows>"
    required_for: "rerun the per-rung transfer measurement via the shared harness"
    checksum: "pinned in runs/merges/why_think_<rows>.json after --stage merge --rows N"
    regenerate: "python scripts/run.py --stage merge --rows N"
  - name: "shared coding-fitness harness (measurement-side; referenced, not copied)"
    storage: "experiments/qwen35_4b_coding_fitness_harness/scripts/eval_pass1.py"
    required_for: "greedy pass@1 grading of base + each rung on HumanEval + MBPP, THINKING-ON (grader ignores comments)"
    checksum: ""
    regenerate: "owned by the fitness-harness cell (being fixed to thinking-on + 8192 budget); reused as-is"
omitted_artifacts:
  - path: "large_artifacts/qwen35_4b_why_think_scale/"
    reason: "rung corpora (large, deterministically regenerable, sha-pinned in the manifest) + trained adapters + merged 9 GB composites; never checked into git"
  - path: "runs/training/, runs/merges/, runs/measure/"
    reason: "produced by the GPU stages; committed as small JSON receipts between stages, not present until then"
reproducibility:
  smoke_command: "python scripts/run.py --smoke"
  gen_ladder_command: "python scripts/run.py --stage gen-ladder"
  verify_ladder_command: "python scripts/build_ladder.py --verify"
  full_command: "python scripts/run.py --stage train --rows N && python scripts/run.py --stage merge --rows N && python scripts/run.py --stage measure --rows N  # per rung in {2000,5000,10000,20000,40000}"
  build_curriculum_command: "python scripts/gen_why_think_curriculum.py --rows N --out <path> --receipt <path>"
  verify_curriculum_command: "python scripts/gen_why_think_curriculum.py --verify-corpus <path> --expected-sha <sha>"
  required_external_artifacts:
    - "large_artifacts/qwen35_4b_universal_curriculum/merged/base_reserialized"
  in_repo_reproducibility_critical:
    - "scripts/gen_why_think_curriculum.py (dual-channel scale-capable generator, construction seed 95200)"
    - "scripts/build_ladder.py + data/ladder_manifest.json (sha-pinned five-rung ladder; pins generator sha + fixture sha + per-rung corpus sha)"
    - "data/contamination/banned_function_names.json (668 benchmark function names)"
    - "data/provenance/base_reserialized.json (base composite provenance pin, sha 25aee794...)"
    - "scripts/train_think.py (vendored, sha e0eca2a2...)"
    - "scripts/merge_adapter.py (vendored, sha cb9af8b4...)"
notes: "Phase A of scale-then-RLVR, CORRECTED to a DUAL-CHANNEL WHY-think curriculum: a genuine step-by-step derivation in the <think> block (byte-verified against real execution) AND strippable #WHY: comments, so training teaches WHY while PRESERVING the 4B's native thinking (its coding depends on the think trace). The PRODUCTION side is fully in-cell (generator + seed 95200 + fixture + manifest + vendored trainer/merger + recipe seed 95201); the rung corpora are large and deterministically regenerable, so they are gitignored large artifacts pinned by the committed manifest. Comments are inert to the execution grader, so a pass@1 gain is an unconfounded code improvement; the measurement is THINKING-ON with the base co-measured per rung (no hardcoded thinking-off anchor). The ladder is a SWEEP: the orchestrator runs each rung and assembles the pass@1(rows) curve to find the peak as the SFT foundation for RLVR."
