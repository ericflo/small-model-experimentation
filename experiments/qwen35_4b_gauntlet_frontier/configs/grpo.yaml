# GRPO-lite round: on-policy generation from the blend model at the residual
# strata, group-relative advantage-weighted training (the one mechanism class
# untried against the C53 second wall). C29 guard: negative advantages are
# clamped to a small magnitude; low LR; warm start from the blend adapter.

round: 5
artifacts_dir: large_artifacts/qwen35_4b_gauntlet_frontier

engine:
  max_model_len: 16384
  gpu_memory_utilization: 0.85
  max_num_seqs: 64
  max_num_batched_tokens: 16384

harvest:
  run_seed: 45001
  temperature: 0.9            # wider group spread -> better advantage signal
  top_p: 0.95
  top_k: 20
  think_budget: 2048
  episode_think_budget: 2048
  answer_max_tokens: 192
  atoms:
    families: [caravan, foundry_ledger, stallwright, runeward, kilnrite, glyphgate, loomfix, ferrier, burrowmaze, gatepost, patchwheel, packhouse]
    gen_seed: 19001           # fresh namespace
    k: 6
    per_level: {2: 12, 3: 20, 4: 20, 5: 12}
  episodes:
    families: []              # atoms-only for GRPO v1
    seed_base: 29000
    k: 1
    per_level: {}

sft:
  out: data/unused.jsonl
  max_think_tokens: 2000
  max_answer_tokens: 96
  max_per_item: 2
  max_rollouts_per_episode: 2
  family_cap: 500

grpo:
  neg_clamp: 0.15             # max |weight| for negative-advantage rows
  pos_clamp: 1.0
  min_group_spread: 1e-6      # skip groups where all K samples tie
  lr: 5.0e-5
  epochs: 1.0
  data_out: data/grpo_round1.jsonl

train:
  adapter_out: large_artifacts/qwen35_4b_gauntlet_frontier/adapters/grpo1
  epochs: 1.0
  lr: 5.0e-5
  rank: 32
  alpha: 64
  grad_accum: 16
  batch_size: 1
  max_length: 2048
  seed: 42

eval_gym:
  gen_seed: 90001
  atoms_per_level: 15
  episodes_per_level: 6
  episode_levels: [2, 3, 5]
  think_budget: 1024
  answer_max_tokens: 96

menagerie:
  tier: medium
  think: default
