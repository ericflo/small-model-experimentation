schema_version: 1
experiment_id: qwen35_4b_specialist_policy_integration

model:
  id: Qwen/Qwen3.5-4B
  revision: 851bf6e806efd8d0a36b00ddf55e13ccb7b8cd0a
  artifacts_root: large_artifacts/qwen35_4b_specialist_policy_integration
  incumbent_data: experiments/qwen35_4b_gauntlet_frontier/data/sft_blend.jsonl

engine:
  max_model_len: 16384
  gpu_memory_utilization: 0.85
  max_num_seqs: 48
  max_num_batched_tokens: 16384
  cudagraph_capture_sizes: [1, 2, 4, 8, 16, 24, 32, 40, 48]

domains:
  discover: [glyphgate, loomfix]
  control: [kilnrite, burrowmaze]
  tools: [ferrier]
  compose: [cipherkiln, mazeferry]

split:
  train_families: [glyphgate, loomfix, kilnrite, burrowmaze, ferrier, cipherkiln, mazeferry]
  primitive_transfer_families: [patchwheel, spindle, gatepost]
  compound_transfer_families: [patchferry, tripleforge]
  transfer_families: [patchwheel, spindle, gatepost, patchferry, tripleforge]
  replay_excluded_families: [patchwheel, spindle, gatepost, patchferry, tripleforge]
  calibration_seed_base: 80500
  split_seed: 60011

seeds:
  oracle_demo_base: 61100
  dagger_visit_base: 62100
  rl_collect_base: 63100
  teacher_audit_base: 64100
  proxy_eval_base: 71100
  atom_retention: 72100
  training: [42, 43, 44]
  shuffled_reward: 53
  wrong_route: 54
  menagerie_first: 54101

collection:
  thinking_budget: 768
  answer_max_tokens: 96
  temperature: 0.8
  top_p: 0.95
  top_k: 20
  oracle_demo_per_level: {1: 3, 2: 3, 3: 3}
  dagger_per_level: {2: 10, 3: 12, 4: 10}
  dagger_sampled_rollouts_per_episode: 1
  dagger_include_greedy: true
  expert_demo_max_fraction: 0.20
  max_rows_per_family: 320
  max_rows_per_episode: 10
  process_trace_word_cap: 120
  replay_fraction: 0.20
  replay_rows: 640
  confident_failure_max_operator_entropy: 0.40
  confident_failure_max_mean_score: 0.25

incumbent_train:
  epochs: 2.5
  learning_rate: 0.0002
  rank: 32
  alpha: 64
  batch_size: 1
  grad_accum: 16
  max_length: 2048
  think_loss_weight: 0.2

dagger_train:
  epochs: 1.5
  learning_rate: 0.0001
  rank: 32
  alpha: 64
  batch_size: 1
  grad_accum: 16
  max_length: 4096
  think_loss_weight: 0.2

rl_collection:
  per_level: {2: 10, 3: 12, 4: 12}
  group_size: 4
  thinking_budget: 768
  answer_max_tokens: 96
  temperature: 0.8
  top_p: 0.95
  top_k: 20
  success_turn_penalty: 0.01
  min_outcome_std: 0.0001

rl_train:
  learning_rate: 0.00002
  rank: 16
  alpha: 32
  batch_size: 1
  grad_accum: 8
  max_steps: 120
  max_length: 4096
  clip_epsilon: 0.20
  kl_beta: 0.02
  max_mean_sampled_token_kl: 0.10
  max_grad_norm: 1.0
  think_loss_weight: 0.2
  anchor_coef: 0.10
  anchor_every: 2
  checkpoint_every: 20

teacher_audit:
  prefixes_per_domain: 128
  branch_top_k: 4
  continuations_per_branch: 4
  mini_updates: 5
  continuation_reward_delta: 0.08
  wrong_route_reward_delta: 0.05
  pressure_quartile_lift: 0.08
  pressure_vs_wrong_route_delta: 0.05
  max_median_non_target_logit_drift: 0.10
  max_entropy_relative_drop: 0.10
  max_correction_marker_relative_drop: 0.10

mopd:
  top_k: 50
  retention_fraction: 0.20
  learning_rate: 0.00002
  rank: 32
  alpha: 64
  batch_size: 1
  grad_accum: 8
  max_steps: 120
  max_length: 4096
  max_grad_norm: 1.0
  checkpoint_every: 20
  max_policy_lag_updates: 1
  consume_rollout_once: true

controls:
  # GRPO uses a frozen-reference forward plus a policy forward and periodic
  # anchor forward. 300 SFT steps conservatively overmatch its forward-token
  # opportunity rather than merely matching optimizer-step count.
  matched_sft_steps: 300
  joint_rl_steps: 600
  wrong_route_steps: 120
  paired_bootstrap_samples: 10000
  retention_fraction: 0.20

proxy_eval:
  levels: [2, 3, 4]
  calibration_episodes_per_level: 24
  confirmatory_episodes_per_level: 128
  thinking_budget: 1024
  answer_max_tokens: 96
  atom_levels: [1, 2, 3, 4]
  atoms_per_level: 24

gates:
  calibration_max_incumbent_compound_score: 0.60
  oracle_min_score: 0.95
  primitive_ablation_max_success: 0.20
  specialist_incumbent_delta: 0.10
  specialist_vs_dagger_delta: 0.05
  specialist_vs_extra_sft_delta: 0.05
  specialist_vs_shuffled_delta: 0.03
  specialist_max_retention_regression: 0.05
  specialist_max_natural_close_regression: 0.10
  specialist_max_entropy_relative_drop: 0.10
  specialist_max_correction_marker_relative_drop: 0.10
  specialist_required_primitive_count: 3
  integration_mean_headroom_recovery: 0.75
  integration_min_domain_headroom_recovery: 0.50
  integration_vs_joint_rl: 0.10
  integration_vs_offpolicy_sft: 0.05
  integration_vs_wrong_route: 0.05
  compound_vs_incumbent: 0.15
  compound_vs_best_specialist: 0.10
  compound_vs_joint_rl: 0.05
  primitive_transfer_min_delta: 0.00
  primitive_transfer_two_family_delta: 0.05
  menagerie_medium_delta: 0.05
  menagerie_quick_min_delta: 0.00
  menagerie_slow_min_delta: 0.00
