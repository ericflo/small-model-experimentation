notes: >-
  The frozen design receipt remains authoritative. Setup artifacts produced under source digests
  903f1914, 9fd420f5, and 3baa7b53 are invalid and preserved in separate content-hashed external
  archives. The source-3baa archive contains exactly 20 files totaling 17,775,495 bytes, including
  the durable seed-7411 G0 pass and an access ledger with zero events. Its fixed positive control
  stopped at 0/48 and remains separately preserved by failure receipt identity
  44397a2e278293bf54fe5d172ac4294c565a2a98ab7c8f4faaeb5ee044e8ec7c. Review identified the omitted
  global accumulation of 16 as a setup-path defect. The archive receipt truthfully records
  fe82f8cfe13d656a588c8f2766fc5519820edd884c9b855dcf7a16a14af547d5 as its transaction's replacement
  source. A later repository gate added fail-closed removal of empty source directories; no setup was
  created between those source changes. Adversarial recovery review then added resumable cleanup and
  no-follow canonical path checks; no setup was created during that source change either. The final
  regeneration source is
  1d1368cf064689322d9df7f345e67b026cecccc32d3a7b7514b82f253d434b0a. The now-archived CPU smoke,
  data manifest, empty seal ledger, and all three initialization bundles were recreated under that
  source and strictly reopened. The manifest SHA256 is
  85286a9549b0e74111eaa0c1254f04f68cad4d75159abc8ba59c169637280cd9 and the ledger identity is
  b122d49054cd37474784a8b4ec3bcc0026e745321718dee799615e3051983c14. The archived seed-7411 LoRA G0
  receipt has SHA256 8c381fc7e883e384debef6ce64e55dd57aacab6f30e4a17dd6ef82d4db56aa01 and identity
  928e756fa6aea30104f0ed8a71c03620ed8663198a4811f6fcf9b6fda53f820c. The corrected seed-7411
  positive-control receipt has SHA256 f71ee195b3e326abe59daca019b266932990f17adff20ceba8b414f5ac8c88ec,
  identity 8db4595e1473d2f26d1d99d2ac1bb9be45947720d676bf43cc697cb90b402df7, and fixed-final score
  48/48 after 256 updates and 4,096 presentations. No result artifact exists; later-seed setup must
  pass before result training. Seed-7412 G0 subsequently stopped at the live-joint reachability gate:
  its aggregation scalar had a present finite gradient of exact norm zero while all other required
  trainable groups were finite and nonzero. The tracked-only failure receipt identity is
  ce3406f8fa788c08421687d5d6a0843a2eb7035fd254d5086123d895b2bb634c; no canonical seed-7412 G0
  output exists and the receipt authorizes nothing. The reviewed FP32 convex-mix and durable G0
  failure-persistence repair is complete under replacement source
  d4269bf34f7c80affcc8c1e8a33fee9afddcd912d1bd9dead223e520ee108b36 with 201/201 tests passing.
  The complete source-1d1368 setup is now durably preserved in a 21-file, 18,288,790-byte archive at
  receipt identity 13cdcaec2828e394c625e56955b8d36d4dc4dd6eabbd314dd686bbe143b2050b.
  Canonical source-1d setup paths were removed only after byte-for-byte archive verification, and an
  idempotent replay revalidated the same receipts without mutation. Replacement-source CPU smoke,
  manifest, empty ledger, and all three initialization bundles have now been regenerated under
  d4269bf34f7c80affcc8c1e8a33fee9afddcd912d1bd9dead223e520ee108b36. Their CPU/manifest/ledger
  SHA256 values are 1d5a57c96bfbab02187120d777af3bf2bd6d728c763b7056d0325f3769e46fdb,
  e935c31ac313e9e6a08d5c1987fb7fd878d7dd0c328dedec45a2b2d9f2641e57, and
  b8c05d36623e98415a9cc8c68c1992c45c4e808a82fdd12397f16d211089420f. The ledger has zero events;
  no sealed payload was decompressed during reopening; and every initialization tensor-value digest
  equals its source-1d predecessor. Seed-7411 G0 subsequently passed at receipt SHA256
  5127c305b7aa047866b9dfde34bf6e679b1749c3ea4a8d0ccffc44bfde4ecedd and identity
  185835ee1fa6d51851f8e0c557d1144c40e4f0c297181673157a6ba402f93216. Its aggregation scalar has
  finite nonzero live-joint gradient 5.328678525984287e-5, every other required group passed, and the
  receipt authorizes only the seed-matched setup control. That control subsequently passed at receipt
  SHA256 9dcd28eec2659ea299462006fe7c8e392aefe9a325c422b913409f60b8f14850 and identity
  6a1394d9a877bd39bfada3bfa4f1def719fbce01bad618283213747fda14cefa: oracle 1.0, intact 48/48,
  disabled 0/48, 256 updates, accumulation 16, and 4,096 presentations. Later-seed setup still blocks
  every result stage. Seed-7412 G0 then passed at receipt SHA256
  3ef958690e87800a9197d182ca4dab1723f6d50639e59ca682521ffc5a4aa2ca and identity
  737a8b39e61cce79f31e834b4630c34c5b1694e7fbbfb509ca31045f3f10a89f. Its formerly exact-zero
  aggregation scalar now has finite nonzero gradient 6.673135794699192e-5; the unchanged G0 gate and
  every other registered mechanic pass. This validates the narrow precision repair as setup evidence
  only. Seed-7412's control subsequently passed at receipt SHA256
  c76da222e14a65f5e7d07e891e0e1ac539bf277f9968aafbc73187a476cda254 and identity
  02a329d9efcee997f9616151f9a3a2c663b418c6a1046be1685e1b0ada91669a: oracle 1.0, intact 48/48,
  disabled 0/48, 256 updates, and 4,096 presentations. A pre-result authorization re-audit then found
  incomplete consumer-side enforcement of producer-written identity/access/authorization fields and
  runbook-only stage-order barriers. No result stage ran; source repair, archival, regeneration, and
  ordered setup replay are required before any scientific training. The source-d426 audit failure is
  preserved at tracked receipt identity 1889212115ba1740039ff66b89eda4a02ea079573dc87f0d366a472ba39a3a13.
  It triggered the completed 23-file, 18,927,960-byte source-d426 archive at receipt identity
  e7a713624d0738016f3d3f823b7487ed8de40e8bad4f32c12ae5540f72818b77 and files identity
  1538f2f2a3952dbfb000a8fe41b34b67cd82aa1c011e08143570503550ec3ed0. Every archive payload and
  zero-length quarantine leaf was independently verified, canonical setup cleanup was exact, and an
  idempotent replay changed nothing. Post-archive validation required tracked empty structural
  sentinels in the retained setup directories; source v9 validates and preserves those sentinels
  without adding them to the evidence inventory. The combined source-v9/archive checkpoint is
  published and green. Source-v9 CPU smoke, data, empty ledger, and all three initialization bundles
  are regenerated with CPU/manifest SHA256 1655354b00d66b29338443f430bad1f9efae0bb3a03db74a1bda054d59445a38
  and 957013adbe43f898ca63d34917b6d78c1f41f014cc01397b5b1c3456f19a4517, data-contract identity
  3677a0a388de767ed2cb989c1a1825049ca0edfe764bb2b4bc3c2dc04baae761, and empty-ledger identity
  eb8028bfe0d5a4f988e92629a5814e6c247950ecf999a28d69cbcff4ad9c84dc. Initialization tensor values
  match their archived predecessors exactly and every sidecar is byte-identical to its tracked mirror.
  No model, benchmark, or sealed payload was opened during non-model regeneration. Its checkpoint was
  published and green before source-v9 seed-7411 G0 stopped at model setup: the general no-alias
  reader rejected Hugging Face's standard snapshot symlink. The byte-identical canonical and mirror
  receipts have SHA256 39ec9625ee0c7a22a618eb0e60d333544a9aefb03b2a057c9e2e222158046ec7
  and identity 30af333c2dd643856fbf34988273fbcddce9c4c60dbdc324035b90f37e09cfe9,
  opened only train validation, and authorize nothing. Source v10's dedicated cache proof validates
  all nine files (9,342,815,919 bytes) at exact revision with file-set identity
  06486f260c8e9135835c768802e0e947bab0470e4454a36e138da6d10ed1fe12 without loading the model.
  Source v10 is published and green. The completed source-v9 archive contains 20 files totaling
  17,655,138 bytes at receipt identity 8d5fe94d91a7b6af7b12629b0a135cfa907a5862ec07f363b8c51d577533ad5c
  and files identity 7360b00d6ea5ca1c74bbd475e67ab5238e3343376247834e31ed698f7b1f2650.
  Independent verification matched every payload and zero-quarantine leaf, exact canonical cleanup,
  the retained G0 failure mirror, and an idempotent replay. Archive commit 9c1fadde passed both
  workflows before source-v10 regeneration. Source-v10 CPU smoke SHA256 is
  ebfb68feac8eab8ed9e5304defa9497b3911ef01d6578be90c000d2010317bc5; manifest SHA256 is
  0b1cca35ed8c13a5d29a6632c9e7d86effa5dce7c61bdba2172217d19e27422a; data-contract identity is
  5fba6c3c94590e70314139558b6a54980bc571b21b556194d3fb6970c6a4c252; and the empty-ledger identity
  is d0b9eda7b48ec63149ac13588c23dbd2c9c15e0f5c9711582c2a4b2ae0617e04. All three initialization
  bundles reopen through the canonical loader, exactly match their archived source-v9 tensor-value
  digests, and have byte-identical but inode-distinct tracked mirrors. No model, benchmark, or sealed
  split was opened during this regeneration. Publish this non-model checkpoint and require both
  workflows before seed-7411 G0.
  The first Qwen load stopped before wrapper construction or mechanics and is preserved by a tracked
  failure receipt; it opened
  only the permitted training validator, no sealed contrast, and produced no canonical G0 output.
  The second Qwen load passed every registered in-memory G0 mechanic but failed at the final receipt
  write because a local probe value shadowed the output path. It also produced no canonical G0
  output, opened no sealed contrast, and authorizes no positive control or result-bearing stage.
  Those two attempts produced no positive-control pass or result-bearing artifact; the later
  canonical seed-7411 positive-control pass is recorded above. Populate exact SHA256 values only from
  regenerated receipts after each later artifact is created. Small data manifests,
  the contrast access ledger, the canonical reports/design_receipt.json, initialization receipts,
  mechanics and branch receipts, training metrics, evaluation rows and summaries, analysis outputs,
  and run indices belong in git when generated. In particular, evaluation of contrast_validation,
  contrast_depth, and contrast_joint requires the tracked analysis/stage_b_seal.json receipt with
  exact status STAGE_B_CONTRAST_AUTHORIZED; the LoRA-miss receipt alone is not authorization. The six
  capacity-by-seed evaluation jobs each contain all three sealed splits in intact and disabled modes.
  A full-rank trigger miss keeps all three contrast payloads sealed and uses that same Stage-B receipt
  to license state-only instead. After authorized evaluation, a LoRA intact pass across the complete
  sealed matrix takes terminal priority regardless of the full-rank score. With full rank passing,
  every LoRA trigger-failed category must fail again in its matching sealed domain before rescue.
  An interrupted same-cell sealed evaluation requires one newly content-validated tracked
  FAILED_ATTEMPT_ARCHIVED receipt per retry; each is appended to the existing ledger event under a
  separate stable lock inode, then event and ledger identities are recomputed. The ledger is
  atomically replaced after temporary-file fsync and followed by parent-directory fsync. Initial
  access rejects an archive predating its event. Completed evaluations cannot be archived as
  failures. Any realized failed-attempt archive is a
  required audit artifact and must be added to required_external_artifacts before terminal reporting.
  Conditional artifact paths are plans, not evidence that their branches were reached. Update
  required_external_artifacts to the realized fixed-final paths before reporting a terminal result.
