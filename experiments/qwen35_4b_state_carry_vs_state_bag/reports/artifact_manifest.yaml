schema_version: 1
experiment_id: "qwen35_4b_state_carry_vs_state_bag"
external_artifacts:
  - name: "pilot Carry/Bag checkpoints"
    storage: "large_artifacts/qwen35_4b_state_carry_vs_state_bag/pilot_{carry,bag}_seed7401/"
    required_for: "audit of the independent promotion decision"
    checksum: "pending run; each checkpoint.json hashes every adapter file and loop_state.pt"
    regenerate: "follow experiments/qwen35_4b_state_carry_vs_state_bag/docs/gpu_runbook.md section 4"
  - name: "continuous Carry/Bag checkpoints"
    storage: "large_artifacts/qwen35_4b_state_carry_vs_state_bag/{carry,bag}_seed{7411,7412,7413}/"
    required_for: "full mechanism replication and exact evaluation reruns after execution"
    checksum: "pending run; each checkpoint.json hashes every adapter file and loop_state.pt, and reload enforces them"
    regenerate: "follow experiments/qwen35_4b_state_carry_vs_state_bag/docs/gpu_runbook.md sections 5-6"
  - name: "explicit textual state-trace adapters"
    storage: "large_artifacts/qwen35_4b_state_carry_vs_state_bag/text_seed*/"
    required_for: "matched decoder-layer-token-budget sample-more comparison after a mechanism pass"
    checksum: "pending conditional run; each checkpoint.json hashes every adapter file"
    regenerate: "follow experiments/qwen35_4b_state_carry_vs_state_bag/docs/gpu_runbook.md section 7"
omitted_artifacts:
  - path: "experiments/qwen35_4b_state_carry_vs_state_bag/data/generated/*.jsonl.gz"
    reason: "deterministic full procedural corpus; potentially large and regenerated from pinned seeds"
  - path: "large_artifacts/qwen35_4b_state_carry_vs_state_bag/"
    reason: "PEFT safetensors and loop-state checkpoints are external by repository policy"
  - path: "experiments/qwen35_4b_state_carry_vs_state_bag/runs/**/rows.jsonl"
    reason: "full evaluation, swap, and raw sample-more rows may exceed practical git size; every realized file must be retained externally with its enforced summary hash"
reproducibility:
  smoke_command: "python3 experiments/qwen35_4b_state_carry_vs_state_bag/scripts/run.py --smoke"
  full_command: "phase-gated and intentionally non-monolithic: follow experiments/qwen35_4b_state_carry_vs_state_bag/docs/gpu_runbook.md sections 1-9; the CLI enforces G0, pilot promotion, fixed-final phases, causal gates, and G4 eligibility"
  required_external_artifacts: []
notes: "Setup-only manifest. The removed mixed-echo variant is not part of this experiment. Add realized durable storage paths and enforced hashes after each result-bearing stage; preserve partial non-resumable attempts and never replace pending entries with unverified claims."
