  full_command: ".venv/bin/python experiments/qwen35_4b_state_carry_vs_state_bag/scripts/run.py --stage prepare-data && .venv/bin/python experiments/qwen35_4b_state_carry_vs_state_bag/scripts/run.py --stage model-smoke"
