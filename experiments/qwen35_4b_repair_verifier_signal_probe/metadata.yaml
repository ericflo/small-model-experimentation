summary: "Lifecycle 21 — a cheap, eval-only FEASIBILITY GATE for a possible on-policy training charter. The menders-shaped eliminative-repair skill is closed to SFT at every tested dose (three pedagogies, 80–800 rows; the dose-scale candidate scored exactly the untrained controls' guess floor). On-policy training (learn from own attempts + live feedback) is the one remaining mechanism class, and it only has signal if the model can VERIFY repairs it cannot propose (C29 precedent: read-only 2AFC verifier 0.81 while generation collapsed; C47: think-judges rescue substrate-scoped no-think judges). This probe measures that verification signal directly: 400 judgments, no training, no benchmark seed, no promotion."
