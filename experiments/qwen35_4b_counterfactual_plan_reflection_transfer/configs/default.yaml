evaluation_proposal:
  candidate_counts: [1, 4, 16]
  qualification_seed: 88031
  confirmation_seed: 88037
  arms:
    - frozen_action
    - frozen_literal_reflection_then_action
    - reflection_correct_action
    - reflection_shuffled_action
    - direct_plan_answer_action
  primary: paired_hidden_exact_accuracy_at_matched_candidate_count
  required_controls:
    - frozen_same_backend_sample_more
    - shuffled_reflection
    - direct_plan_answer_training_positive_control
    - literal_reflection_at_inference
    - family_and_depth_retention
jacobian_stage:
  status: sealed_until_capability_replication
  proposed_layers: [4, 5, 6, 7, 8]
  required_readout_controls:
    - slot_margin
    - unembedding_logit_direction
    - equal_width_non_j
    - shuffled_operation_labels
  required_causal_controls:
    - wrong_operation
    - random_same_norm
    - full_activation
    - non_j_component
  note: exact lens corpus, layer selection, and gates require adversarial review
authorization:
  model_calls: false
  gpu: false
  training: false
  jacobian: false
  benchmarks: false
